version: '3.8'

services:
  mysql:
    image: mysql:8
    container_name: buildmaster-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: buildmaster_db
      MYSQL_USER: buildmaster_user
      MYSQL_PASSWORD: buildmaster_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot123"]
      timeout: 20s
      retries: 10

  backend:
    build: ./backend
    container_name: buildmaster-backend
    environment:
      DB_HOST: mysql
      DB_USER: root
      DB_PASSWORD: root123
      DB_NAME: buildmaster_db
      NODE_ENV: production
      PORT: 5000
    ports:
      - "5000:5000"
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./backend/uploads:/app/uploads

  frontend:
    build: ./frontend
    container_name: buildmaster-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  mysql_data: